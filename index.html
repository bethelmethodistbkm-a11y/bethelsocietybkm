<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bethel Society – Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--blue:#1A3A6B;--blue2:#0D2347;--gold:#C8960C;--gold2:#F0B429;--red:#B91C1C;--green:#15803D;--white:#fff;--offwhite:#F7F5F0;--grey:#6B7280;--light:#EAF0F9;--border:#E5E7EB;--sidebar:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F3F4F6;color:#111827;min-height:100vh;}
/* FULL-SCREEN CARDS */
.fs-screen{min-height:100vh;background:linear-gradient(160deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;padding:1rem;}
.fs-card{background:var(--white);border-radius:10px;padding:2.5rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.fs-card.wide{max-width:720px;}
.fs-logo{text-align:center;margin-bottom:1.75rem;}
.fs-logo .cross{font-size:2.5rem;color:var(--gold);}
.fs-logo h1{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--blue2);margin-top:0.5rem;}
.fs-logo p{font-size:0.73rem;color:var(--grey);margin-top:0.2rem;}
/* TABS */
.login-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.5rem;}
.login-tab{flex:1;padding:0.6rem;text-align:center;cursor:pointer;font-size:0.82rem;font-weight:600;color:var(--grey);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.login-tab.active{color:var(--blue);border-color:var(--blue);}
/* FORMS */
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:0.76rem;font-weight:600;color:#374151;margin-bottom:0.35rem;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.68rem 0.9rem;border:1.5px solid var(--border);border-radius:6px;font-size:0.86rem;font-family:'Inter',sans-serif;transition:border-color 0.2s;background:var(--white);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.form-group textarea{resize:vertical;min-height:75px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.form-hint{font-size:0.72rem;color:var(--grey);margin-top:0.3rem;}
.conditional-box{background:#F9FAFB;border:1px dashed var(--border);padding:1rem;border-radius:6px;margin-bottom:1rem;display:none;}
.contact-entry{display:flex;gap:0.5rem;margin-bottom:0.5rem;}
/* ORGANIZATIONS GRID */
.org-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;background:#F9FAFB;padding:1rem;border-radius:6px;border:1px solid var(--border);}
.org-item{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:#374151;}
.org-item input[type="checkbox"]{width:auto;cursor:pointer;}
/* BUTTONS */
.btn{padding:0.7rem 1.4rem;border-radius:6px;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:'Inter',sans-serif;}
.btn-primary{background:var(--blue);color:var(--white);}
.btn-primary:hover{background:var(--blue2);}
.btn-gold{background:var(--gold);color:var(--blue2);}
.btn-gold:hover{background:var(--gold2);}
.btn-red{background:var(--red);color:var(--white);}
.btn-red:hover{background:#991b1b;}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#166534;}
.btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue);}
.btn-outline:hover{background:var(--light);}
.btn-grey{background:#F3F4F6;color:#374151;border:1.5px solid var(--border);}
.btn-grey:hover{background:#E5E7EB;}
.btn-sm{padding:0.36rem 0.7rem;font-size:0.74rem;}
.btn-full{width:100%;}
.hint-box{background:var(--light);border-radius:6px;padding:0.7rem 1rem;font-size:0.74rem;color:var(--grey);margin-bottom:1.25rem;}
.hint-box strong{color:var(--blue);}
.err-box{background:#FEF2F2;border:1px solid #FCA5A5;color:#B91C1C;padding:0.65rem 0.9rem;border-radius:6px;font-size:0.8rem;margin-bottom:1rem;display:none;}
.suc-box{background:#D1FAE5;border:1px solid #6EE7B7;color:#065F46;padding:0.65rem 0.9rem;border-radius:6px;font-size:0.8rem;margin-bottom:1rem;display:none;}
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:0.72rem;color:var(--grey);}
/* LOADER */
#globalLoader{position:fixed;inset:0;background:rgba(13,35,71,0.93);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;color:var(--white);}
#globalLoader.show{display:flex;}
.pulse-cross{font-size:3rem;color:var(--gold);animation:pulse 1.3s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.55;transform:scale(0.88);}}
.loader-txt{margin-top:1rem;font-size:0.88rem;color:rgba(255,255,255,0.65);}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:0.75rem 1.25rem;border-radius:8px;font-size:0.82rem;font-weight:500;z-index:9998;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:320px;background:var(--blue2);color:var(--white);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
/* PORTAL LAYOUT */
#portal{display:none;min-height:100vh;}
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--blue2);overflow-y:auto;z-index:100;transition:transform 0.3s;display:flex;flex-direction:column;}
.sb-hdr{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
.sb-cross{font-size:1.5rem;color:var(--gold);}
.sb-title{font-family:'Playfair Display',serif;color:var(--white);font-size:0.87rem;font-weight:700;margin-top:0.3rem;}
.sb-sub{color:rgba(255,255,255,0.4);font-size:0.64rem;}
.sb-nav{flex:1;padding:0.75rem 0;}
.nav-sec{font-size:0.59rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:0.7rem 1.2rem 0.3rem;}
.nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:rgba(255,255,255,0.68);cursor:pointer;font-size:0.81rem;font-weight:500;transition:all 0.2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:var(--white);}
.nav-item.active{background:rgba(200,150,12,0.15);color:var(--gold2);border-left-color:var(--gold);}
.nav-item .ico{font-size:0.95rem;width:18px;text-align:center;}
.sb-user{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:0.7rem;}
.u-avatar{width:33px;height:33px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.83rem;font-weight:700;color:var(--blue2);flex-shrink:0;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:0.77rem;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:0.63rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.05em;}
.btn-logout{background:none;border:none;color:rgba(255,255,255,0.35);cursor:pointer;font-size:1rem;padding:0.25rem;transition:color 0.2s;}
.btn-logout:hover{color:var(--red);}
#main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:0.85rem;}
#menuToggle{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:4px;}
#menuToggle span{display:block;width:21px;height:2px;background:var(--blue2);border-radius:2px;}
.pg-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--blue2);}
.tb-right{display:flex;align-items:center;gap:0.65rem;}
.badge{display:inline-block;padding:0.18rem 0.6rem;border-radius:20px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.badge-admin{background:var(--blue);color:var(--white);}
.badge-member{background:var(--green);color:var(--white);}
.badge-adherent{background:#F3F4F6;color:#6B7280;}
.badge-catechumen{background:var(--light);color:var(--blue);}
.badge-junior{background:#FEF3C7;color:#92400E;}
.badge-full{background:#D1FAE5;color:var(--green);}
.sync-pill"><div class="sync-dot"></div>Live · Drive</div>
<span id="roleBadge" class="badge badge-admin">Admin</span>
<span id="tbUser" style="font-size:0.8rem;color:var(--grey);font-weight:500;"></span>
</div>
</div>
<div id="content"></div>
</div>
</div>

<!-- MODAL -->
<div id="overlay">
<div class="modal" id="modal">
<div class="modal-hdr"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body" id="modalBody"></div>
<div class="modal-footer" id="modalFooter"></div>
</div>
</div>

<!-- REGISTER SCREEN -->
<div class="fs-screen" id="registerScreen" style="display:none">
  <div class="fs-card wide">
    <div class="fs-logo"><div class="cross">✝</div><h1>Register as Member</h1><p>Bethel Society Jamdede — Methodist Church Ghana</p></div>
    <div class="err-box" id="regErr"></div>
    <div id="regSuccess" style="display:none;background:#D1FAE5;border:1px solid #6EE7B7;color:#065F46;padding:1.2rem;border-radius:8px;margin-bottom:1rem;text-align:center;">
      <div style="font-size:2rem;margin-bottom:0.5rem">✅</div>
      <strong style="font-size:0.95rem">Registration Successful!</strong>
      <p style="font-size:0.82rem;margin-top:0.4rem">Your login details have been sent via SMS.</p>
      <div id="regCredentials" style="background:rgba(0,0,0,0.06);border-radius:6px;padding:0.75rem;margin-top:0.75rem;font-family:monospace;font-size:0.85rem;text-align:left;"></div>
      <button class="btn btn-primary btn-full" style="margin-top:1rem" onclick="backToLogin()">Proceed to Login →</button>
    </div>
    <div id="regForm">
      <!-- 1. Names -->
      <div class="form-row">
        <div class="form-group"><label>First Name / Other Names *</label><input id="rFirstNames" placeholder="e.g. Kwame Asante"></div>
        <div class="form-group"><label>Last Name (Surname) *</label><input id="rLastName" placeholder="e.g. Osei"></div>
      </div>
      <!-- 2 & 3. DOB & Gender -->
      <div class="form-row">
        <div class="form-group"><label>Date of Birth *</label><input type="date" id="rDob" onchange="handleDobChange('rDob', 'rStatus')"></div>
        <div class="form-group"><label>Gender *</label><select id="rGender"><option>Male</option><option>Female</option></select></div>
      </div>
      <!-- 4. Marital Status -->
      <div class="form-row">
        <div class="form-group"><label>Marital Status</label><select id="rMarital"><option>Single</option><option>Ordinance</option><option>Customary</option><option>Blessing</option><option>Divorced</option></select></div>
        <div class="form-group"><label>Home Region</label><select id="rRegion"><option>Ahafo</option><option>Ashanti</option><option>Bono</option><option selected>Bono East</option><option>Central</option><option>Eastern</option><option>Greater Accra</option><option>Nothern</option><option>Savannah</option><option>North East</option><option>Upper East</option><option>Upper West</option><option>Volta</option><option>Oti</option><option>Western</option><option>Western North</option></select></div>
      </div>
      <!-- Hometown & Profession -->
      <div class="form-row">
        <div class="form-group"><label>Hometown</label><input id="rHometown" placeholder="e.g. Berekum"></div>
        <div class="form-group"><label>Profession / Trade</label><input id="rProfession" placeholder="e.g. Carpenter, Accountant"></div>
      </div>
      <!-- 5. Employment Status -->
      <div class="form-row">
        <div class="form-group"><label>Employment Status</label><select id="rEmployment" onchange="toggleStudentCategory('rEmployment', 'rStudentCatWrapper')"><option>Formal</option><option>Self Employed</option><option>Unemployed</option><option>Student</option></select></div>
        <div class="form-group" id="rStudentCatWrapper" style="display:none;"><label>Student Category</label><select id="rStudentCategory"><option>Elementary</option><option>Basic</option><option>JHS</option><option>SHS</option><option>NVTI / Vocational Training</option><option>Tertiary (University/Training College)</option></select></div>
      </div>
      <!-- 9. Multiple Contacts Dynamic Room -->
      <div class="form-group">
        <label>Contact Number(s) *</label>
        <div id="rContactsContainer">
          <div class="contact-entry"><input class="r-phone-input" placeholder="Primary Phone (02X XXXXXXX)" type="tel"></div>
        </div>
        <button type="button" class="btn btn-grey btn-sm" style="margin-top:0.25rem" onclick="addContactField('rContactsContainer')">+ Add Another Contact Number</button>
      </div>
      <!-- 10. Membership Type -->
      <div class="form-row">
        <div class="form-group"><label>Membership Type *</label><select id="rStatus"><option>Full Member</option><option>Adherent</option><option>Catechumen</option><option>Junior Member</option></select><div class="form-hint" id="rAgeHint">Auto-set to Junior if under 18.</div></div>
        <div class="form-group"><label>Distant Member?</label><select id="rIsDistant" onchange="toggleDistantFields('rIsDistant','rDistantWrapper')"><option value="No">No</option><option value="Yes">Yes</option></select></div>
      </div>
      <!-- 11. Conditional Distant Details -->
      <div id="rDistantWrapper" class="conditional-box">
        <div class="form-row three">
          <div class="form-group"><label>Diocese Name</label><input id="rDistantDiocese" placeholder="e.g. Sunyani Diocese"></div>
          <div class="form-group"><label>Circuit Name</label><input id="rDistantCircuit" placeholder="e.g. Berekum Circuit"></div>
          <div class="form-group"><label>Society Name</label><input id="rDistantSociety" placeholder="e.g. Bethel Society"></div>
        </div>
      </div>
      <!-- 12 & 13. Invalid status & Optional Role -->
      <div class="form-row">
        <div class="form-group"><label>Invalid Member (SICK/BOUND)?</label><select id="rIsInvalid"><option value="No">No</option><option value="Yes">Yes</option></select></div>
        <div class="form-group"><label>Children Service Teacher?</label><select id="rChildrenTeacher"><option value="No">No</option><option value="Yes">Yes</option></select></div>
      </div>
      <!-- 14. Organizations Checks -->
      <div class="form-group">
        <label>Church Organizations / Fellowships Joined</label>
        <div class="org-grid" id="rOrgs">
          <label class="org-item"><input type="checkbox" value="Men's Fellowship"> Men's Fellowship</label>
          <label class="org-item"><input type="checkbox" value="Women's Fellowship"> Women's Fellowship</label>
          <label class="org-item"><input type="checkbox" value="Christ Little Band"> Christ Little Band</label>
          <label class="org-item"><input type="checkbox" value="Guild"> Guild</label>
          <label class="org-item"><input type="checkbox" value="SUWMA"> SUWMA</label>
          <label class="org-item"><input type="checkbox" value="Choir"> Choir</label>
          <label class="org-item"><input type="checkbox" value="Singing Band"> Singing Band</label>
          <label class="org-item"><input type="checkbox" value="MYF"> MYF (Youth)</label>
          <label class="org-item"><input type="checkbox" value="Brigade"> Boys' & Girls' Brigade</label>
          <label class="org-item"><input type="checkbox" value="Girls Fellowship"> Girls Fellowship</label>
          <label class="org-item"><input type="checkbox" value="Gospel Band"> Gospel Band</label>
        </div>
      </div>
      <p class="form-hint" style="margin-bottom:1rem">Your access credentials will be automatically generated and sent to your primary phone number.</p>
      <button class="btn btn-gold btn-full" onclick="doRegister()">Register System Record →</button>
      <div class="divider"><span>or</span></div>
      <button class="btn btn-grey btn-full" onclick="backToLogin()">← Back to Login</button>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div class="fs-screen" id="loginScreen" style="display:none">
  <div class="fs-card">
    <div class="fs-logo"><div class="cross">✝</div><h1>Bethel Society Portal</h1><p>Jamdede &bull; Berekum Circuit &bull; Methodist Church Ghana</p></div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="setTab('admin')">Admin</div>
      <div class="login-tab" onclick="setTab('member')">Member</div>
    </div>
    <div id="adminHint" class="hint-box"><strong>Admin:</strong> admin &nbsp;/&nbsp; bethel2025</div>
    <div id="memberHint" class="hint-box" style="display:none">Use your registered username and password. If you don't have one, register below.</div>
    <div class="err-box" id="loginErr"></div>
    <div class="form-group"><label>Username</label><input id="loginUser" placeholder="Username" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In →</button>
    <div class="divider"><span>New member?</span></div>
    <button class="btn btn-gold btn-full" onclick="showRegister()">Register as Member</button>
  </div>
</div>

<!-- PORTAL -->
<div id="portal">
  <div id="sidebar">
    <div class="sb-hdr"><div class="sb-cross">✝</div><div class="sb-title">Bethel Society</div><div class="sb-sub">Member Portal</div></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-user">
      <div class="u-avatar" id="sbAv">?</div>
      <div class="u-info"><div class="u-name" id="sbName">User</div><div class="u-role" id="sbRole">Member</div></div>
      <button class="btn-logout" onclick="doLogout()" title="Logout">✕</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div class="tb-left">
        <button id="menuToggle" onclick="toggleSB()"><span></span><span></span><span></span></button>
        <div class="pg-title" id="pgTitle">Dashboard</div>
      </div>
      <div class="tb-right">
        <div class="sync-pill"><div class="sync-dot"></div>Live · Drive</div>
        <span id="roleBadge" class="badge badge-admin">Admin</span>
        <span id="tbUser" style="font-size:0.8rem;color:var(--grey);font-weight:500;"></span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
// ===== CONFIG =====
const API_URL = 'https://script.google.com/macros/s/AKfycbzWKd_fyjAJQ1rI__sCUlJ-i-g_K_m2g4qOtm9scfhR2X21uf2HHAQcEOdykUIRWPVJ/exec';
const API_KEY = 'BethelJamdede2025!';
let CACHE = { members:[], attendance:[], meetings:[], finances:[] };
let currentUser = null, loginTab = 'admin', charts = {};

// ===== INIT =====
window.onload = () => { show('loginScreen'); };

function show(id) {
  ['registerScreen','loginScreen','portal'].forEach(x => {
    const el = document.getElementById(x);
    if (!el) return;
    el.style.display = x === id ? (x === 'portal' ? 'block' : 'flex') : 'none';
  });
}

// ===== CONDITIONAL CONDITIONAL FIELD HANDLERS =====
function toggleStudentCategory(selectId, wrapperId) {
  const val = document.getElementById(selectId).value;
  document.getElementById(wrapperId).style.display = (val === 'Student') ? 'block' : 'none';
}
function toggleDistantFields(selectId, wrapperId) {
  const val = document.getElementById(selectId).value;
  document.getElementById(wrapperId).style.display = (val === 'Yes') ? 'block' : 'none';
}
function addContactField(containerId, value = '') {
  const container = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'contact-entry';
  div.innerHTML = `<input class="r-phone-input" placeholder="Alternate Phone" type="tel" value="${value}"><button type="button" class="btn btn-red btn-sm" onclick="this.parentNode.remove()">✕</button>`;
  container.appendChild(div);
}
function handleDobChange(dobId, statusSelectId) {
  const dobVal = document.getElementById(dobId).value;
  if(!dobVal) return;
  const age = new Date().getFullYear() - new Date(dobVal).getFullYear();
  if (age < 18) {
    document.getElementById(statusSelectId).value = 'Junior Member';
  }
}

// ===== API CORE =====
async function apiGet(action) {
  const res = await fetch(API_URL + '?' + new URLSearchParams({key:API_KEY,action}), {redirect:'follow'});
  return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(API_URL, {method:'POST', body:JSON.stringify({key:API_KEY,action,...payload}), redirect:'follow'});
  return res.json();
}

// ===== AUTH =====
function setTab(t) {
  loginTab = t;
  document.querySelectorAll('.login-tab').forEach((el,i) => el.classList.toggle('active', i===(t==='admin'?0:1)));
  document.getElementById('adminHint').style.display = t==='admin'?'':'none';
  document.getElementById('memberHint').style.display = t==='member'?'':'none';
}
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim(), p = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr'); err.style.display = 'none';
  if (!u||!p) { err.textContent='Enter username and password.'; err.style.display='block'; return; }
  showLoader('Signing in...');
  try {
    const res = await apiGet('getMembers'); CACHE.members = res.data || [];
    const found = CACHE.members.find(m=>m.username===u&&m.password===p);
    if (!found) { hideLoader(); err.textContent='Invalid username or password.'; err.style.display='block'; return; }
    if (loginTab==='admin'&&found.role!=='admin') { hideLoader(); err.textContent='Admin credentials required.'; err.style.display='block'; return; }
    currentUser = found; await loadAll(); startPortal();
  } catch(e) { hideLoader(); err.textContent='Connection error: '+e.message; err.style.display='block'; }
}
function doLogout() {
  currentUser = null; CACHE = {members:[],attendance:[],meetings:[],finances:[]};
  show('loginScreen'); document.getElementById('loginUser').value=''; document.getElementById('loginPass').value='';
}

function navigate(view) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===view));
  const titles={dashboard:'Dashboard',members:'Members',attendance:'Service Attendance',meetings:'Meeting Attendance',finances:'Finances',reports:'Reports & Growth',settings:'Settings & SMS',myprofile:'My Profile',mystatus:'Membership Journey'};
  document.getElementById('pgTitle').textContent = titles[view]||'';
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const views={dashboard:renderDashboard,members:renderMembers,attendance:renderAttendance,meetings:renderMeetings,finances:renderFinances,reports:renderReports,settings:renderSettings,myprofile:renderMyProfile,mystatus:renderMyStatus};
  document.getElementById('content').innerHTML='';
  if(views[view]) views[view]();
}

// ===== STRUCTURAL CONCATENATION & SMS HELPERS =====
function sBadge(s){const m={'Adherent':'badge-adherent','Catechumen':'badge-catechumen','Junior Member':'badge-junior','Full Member':'badge-full'};return `<span class="badge ${m[s]||'badge-adherent'}">${s||'Adherent'}</span>`;}
function fmt(n){return 'GH\u20B5'+Number(n||0).toLocaleString('en-GH',{minimumFractionDigits:2});}
function fmtD(d){if(!d)return '\u2014'; return d;}
function mo6(){const o=[];const n=new Date();for(let i=5;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);o.push(d.toISOString().slice(0,7));}return o;}
function moLbl(ym){const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleDateString('en-GB',{month:'short'});}
function showLoader(msg){document.getElementById('loaderTxt').textContent=msg||'Loading...';document.getElementById('globalLoader').classList.add('show');}
function hideLoader()){document.getElementById('globalLoader').classList.remove('show');}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' show';setTimeout(()=>t.classList.remove('show'),3500);}

function showRegister() { show('registerScreen'); document.getElementById('regErr').style.display='none'; document.getElementById('regSuccess').style.display='none'; document.getElementById('regForm').style.display=''; }

// ===== SUBMIT MEMBER DATA PROCESSING =====
async function doRegister() {
  const fNames = document.getElementById('rFirstNames').value.trim();
  const lName = document.getElementById('rLastName').value.trim();
  const err = document.getElementById('regErr'); err.style.display='none';
  
  if(!fNames || !lName){err.textContent='First and Last names are explicitly required.';err.style.display='block';return;}
  
  // 1. First Name + Last Name Combination
  const fullName = fNames + ' ' + lName;
  
  // 9. Collect Multiple Contacts
  const phoneInputs = document.querySelectorAll('.r-phone-input');
  let contacts = [];
  phoneInputs.forEach(i => { if(i.value.trim()) contacts.push(i.value.trim()); });
  if(!contacts.length) { err.textContent='At least one contact number is required.'; err.style.display='block'; return; }
  
  // 14. Collect Organization Checkboxes
  let orgsChecked = [];
  document.querySelectorAll('#rOrgs input[type="checkbox"]:checked').forEach(c => orgsChecked.push(c.value));

  // Run auto age check block safely
  handleDobChange('rDob', 'rStatus');

  const data = {
    fullName,
    firstName: fNames,
    lastName: lName,
    dob: document.getElementById('rDob').value,
    gender: document.getElementById('rGender').value,
    maritalStatus: document.getElementById('rMarital').value,
    homeRegion: document.getElementById('rRegion').value,
    hometown: document.getElementById('rHometown').value,
    profession: document.getElementById('rProfession').value,
    employmentStatus: document.getElementById('rEmployment').value,
    studentCategory: document.getElementById('rStudentCategory').value,
    contacts: contacts.join(', '),
    phone: contacts[0], // Main user dynamic communication channel
    membershipStatus: document.getElementById('rStatus').value,
    isDistant: document.getElementById('rIsDistant').value,
    distantDiocese: document.getElementById('rDistantDiocese').value,
    distantCircuit: document.getElementById('rDistantCircuit').value,
    distantSociety: document.getElementById('rDistantSociety').value,
    isInvalid: document.getElementById('rIsInvalid').value,
    childrenTeacher: document.getElementById('rChildrenTeacher').value,
    organizations: orgsChecked.join(', '),
    joinDate: new Date().toISOString().slice(0,10)
  };

  showLoader('Syncing profile registry...');
  try {
    const res = await apiPost('registerMember', {data});
    hideLoader();
    if(!res.success){err.textContent=res.error||'Registration structural submission failure.';err.style.display='block';return;}
    document.getElementById('regForm').style.display='none';
    document.getElementById('regCredentials').innerHTML='<strong>Username:</strong> '+res.username+'<br><strong>System Password:</strong> '+res.tempPassword;
    document.getElementById('regSuccess').style.display='block';
    CACHE.members.push({...data, id:res.id, username:res.username, password:res.tempPassword, role:'member'});
  } catch(e){hideLoader();err.textContent='Network Exception: '+e.message;err.style.display='block';}
}

// ===== DASHBOARD GENERATION =====

  const mems=CACHE.members.filter(m=>m.role!=='admin');

  document.getElementById('content').innerHTML=`

      <div class="stat-box green"><div class="s-ico">💰</div><div class="s-val">${fmt(totalInc)}</div><div class="s-lbl">Gross Inflows</div></div>
    </div>
    <div class="card"><div class="card-hdr"><div class="card-title">Recent Congregation Registry</div></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Status</th><th>Contacts</th></tr></thead><tbody>${mems.slice(-5).reverse().map(m=>`<tr><td>${m.fullName}</td><td>${sBadge(m.membershipStatus)}</td><td>${m.contacts||m.phone||'—'}</td></tr>`).join('')}</tbody></table></div></div>`;

          </thead>

              <td><strong>${m.fullName}</strong></td>
              <td>${m.gender||'—'}</td>
              <td>${m.contacts||m.phone||'—'}</td>
              <td>${sBadge(m.membershipStatus)}</td>
              <td>${m.hometown||'—'}</td>

async function deleteMember(id){
  if(!confirm('Purge this record completely from sheet framework?'))return;
  showLoader('Purging database log...');
  try{const r=await apiPost('deleteMember',{id});if(!r.success)throw new Error(r.error);CACHE.members=CACHE.members.filter(m=>m.id!==id);hideLoader();renderMembers();toast('Record permanently dropped.','success');}
  catch(e){hideLoader();toast('Error: '+e.message,'error');}
}
